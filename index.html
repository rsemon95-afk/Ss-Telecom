<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS TELECOM PRO</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<!--========================
      HEADER
=========================-->

<div class="header">

<div class="logoBox">

<img src="assets/logo.png" alt="Logo">

</div>

<div class="titleBox">

<h1>SS TELECOM</h1>

<h3>SHOP MANAGEMENT SYSTEM</h3>

</div>

<div class="topBox">

<div class="timeBox">

<div class="head">
TIME
</div>

<div id="liveTime">

00:00:00

</div>

</div>

<div class="dateBox">

<div class="head">
DATE
</div>

<div id="liveDate">

00/00/0000

</div>

</div>

</div>

</div>


<!--========================
    DASHBOARD
=========================-->

<div class="dashboard">



<div class="dash">

<div class="dashHead">
Stock Balance
</div>

<div class="dashValue"
id="stockBalance">

0

</div>

</div>



<div class="dash">

<div class="dashHead">
Total Sales
</div>

<div class="dashValue"
id="totalSales">

0

</div>

</div>



<div class="dash">

<div class="dashHead">
Easyload Stock
</div>

<div class="dashValue"
id="easyloadStock">

0

</div>

</div>



<div class="dash">

<div class="dashHead">
Daily Profit
</div>

<div class="dashValue"
id="dailyProfit">

0

</div>

</div>



<div class="dash">

<div class="dashHead">
Product Buy
</div>

<div class="dashValue"
id="productBuy">

0

</div>

</div>



<div class="dash">

<div class="dashHead">
Monthly Profit
</div>

<div class="dashValue"
id="monthlyProfit">

0

</div>

</div>




<div class="dash">

<div class="dashHead">
Product Sale
</div>

<div class="dashValue"
id="productSale">

0

</div>

</div>



<div class="dash">

<div class="dashHead">
Barbarize Buy
</div>

<div class="dashValue"
id="barbarizeBuy">

0

</div>

</div>



<div class="dash">

<div class="dashHead">
Barbarize Sale
</div>

<div class="dashValue"
id="barbarizeSale">

0

</div>

</div>



<div class="dash">

<div class="dashHead">
Card QYT Stock
</div>

<div class="dashValue"
id="cardStock">

0

</div>

</div>



<div class="dash">

<div class="dashHead">
Profit / Loss
</div>

<div class="dashValue"
id="profitLoss">

0

</div>

</div>



<div class="dash">

<div class="dashHead">
Current Assets
</div>

<div class="dashValue"
id="currentAssets">

0

</div>

</div>

</div>

</body>

</html>
