<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS TELECOM</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>SS TELECOM</h1>
        <p>Shop Management System</p>
    </div>

    <!-- Dashboard Box -->

    <div class="dashboard-box">
        <label>Stock Balance</label>
        <div class="value-box" id="stockBalance">0</div>
    </div>

    <div class="dashboard-box">
        <label>Total Sales</label>
        <div class="value-box" id="totalSales">0</div>
    </div>

    <div class="dashboard-box">
        <label>Easyload Stock</label>
        <div class="value-box" id="easyloadStock">0</div>
    </div>

    <div class="dashboard-box">
        <label>Daily Profit</label>
        <div class="value-box" id="dailyProfit">0</div>
    </div>

    <div class="dashboard-box">
        <label>Product Buy</label>
        <div class="value-box" id="productBuy">0</div>
    </div>

    <div class="dashboard-box">
        <label>Monthly Profit</label>
        <div class="value-box" id="monthlyProfit">0</div>
    </div>

    <div class="dashboard-box">
        <label>Product Sale</label>
        <div class="value-box" id="productSale">0</div>
    </div>

    <div class="dashboard-box">
        <label>Barbarize Sale</label>
        <div class="value-box" id="barbarizeSale">0</div>
    </div>

    <div class="dashboard-box">
        <label>Barbarize Buy</label>
        <div class="value-box" id="barbarizeBuy">0</div>
    </div>

    <div class="dashboard-box">
        <label>Card QYT Stock</label>
        <div class="value-box" id="cardStock">0</div>
    </div>

    <!-- Flexi Load -->

    <h2 class="section-title">Flexi Load</h2>

    <div class="service-box">
        <span>GP</span>
        <div class="balance-box" id="gpBalance">0</div>
    </div>

    <div class="service-box">
        <span>Robi</span>
        <div class="balance-box" id="robiBalance">0</div>
    </div>

    <div class="service-box">
        <span>Banglalink</span>
        <div class="balance-box" id="blBalance">0</div>
    </div>

    <div class="service-box">
        <span>Airtel</span>
        <div class="balance-box" id="airtelBalance">0</div>
    </div>

    <!-- Mobile Banking -->

    <h2 class="section-title">Mobile Banking</h2>

    <div class="service-box">
        <span>bKash</span>
        <div class="balance-box" id="bkashBalance">0</div>
    </div>

    <div class="service-box">
        <span>Nagad</span>
        <div class="balance-box" id="nagadBalance">0</div>
    </div>

    <div class="service-box">
        <span>Rocket</span>
        <div class="balance-box" id="rocketBalance">0</div>
    </div>

    <div class="service-box">
        <span>Upay</span>
        <div class="balance-box" id="upayBalance">0</div>
    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
