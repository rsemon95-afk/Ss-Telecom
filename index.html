<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS Telecom Account Sheet</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="sheet">


<!-- HEADER -->

<div class="title-box">

<h1>SS TELECOM</h1>

<p>Daily Business Accounting Sheet</p>

</div>





<!-- SUMMARY -->

<div class="section">

<div class="section-head">
Daily Summary
</div>


<div class="grid-4">


<div class="cell">
<div class="cell-title">Total Stock</div>
<div class="cell-value">৳ 0</div>
</div>



<div class="cell">
<div class="cell-title">Today's Sale</div>
<div class="cell-value">৳ 0</div>
</div>



<div class="cell">
<div class="cell-title">Profit</div>
<div class="cell-value">৳ 0</div>
</div>



<div class="cell">
<div class="cell-title">Cash</div>
<div class="cell-value">৳ 0</div>
</div>


</div>

</div>







<!-- FLEXI + BANK -->

<div class="section">

<div class="section-head">
Transaction Entry
</div>



<div class="grid-2">



<div class="form-box">


<h3>Flexiload</h3>


<label>GP</label>
<input type="number">


<label>Robi</label>
<input type="number">


<label>Banglalink</label>
<input type="number">


<label>Airtel</label>
<input type="number">


<button>
Save Flexiload
</button>


</div>





<div class="form-box">


<h3>Mobile Banking</h3>


<label>bKash</label>
<input type="number">


<label>Nagad</label>
<input type="number">


<label>Rocket</label>
<input type="number">


<label>Upay</label>
<input type="number">


<button>
Save Banking
</button>


</div>



</div>


</div>







<!-- PRODUCT -->

<div class="section">


<div class="section-head">
Product Account
</div>



<div class="grid-2">



<div class="form-box">


<h3>Product Sale</h3>


<label>Product Name</label>
<input type="text">


<label>Quantity</label>
<input type="number">


<label>Sale Amount</label>
<input type="number">


<label>Profit</label>
<input type="number">


</div>





<div class="form-box">


<h3>Product Buy</h3>


<label>Product Name</label>
<input type="text">


<label>Quantity</label>
<input type="number">


<label>Buy Amount</label>
<input type="number">


<label>Supplier</label>
<input type="text">


</div>


</div>


</div>







<!-- REPORT TABLE -->

<div class="section">


<div class="section-head">
Daily Report
</div>



<table>


<tr>

<th>Date</th>
<th>Type</th>
<th>Description</th>
<th>Amount</th>
<th>Profit</th>
<th>Loss</th>

</tr>



<tr>

<td>-</td>
<td>-</td>
<td>No Data</td>
<td>0</td>
<td>0</td>
<td>0</td>

</tr>


</table>


</div>





</div>


<script src="app.js"></script>

</body>

</html>
